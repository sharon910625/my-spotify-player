<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharon's Personal Dashboard</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: transparent; margin: 0; padding: 10px; }
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 15px; border: 1px solid #e0e0e0; }
        h2 { font-size: 16px; color: #333; margin-top: 0; border-bottom: 2px solid #f0f0f0; padding-bottom: 8px; }
        .news-item { font-size: 14px; margin-bottom: 10px; border-bottom: 1px solid #f9f9f9; padding-bottom: 5px; }
        .news-item a { color: #007aff; text-decoration: none; }
        iframe { border-radius: 8px; }
    </style>
</head>
<body>

<div class="container">
    <!-- Pinterest Board -->
    <div class="card">
        <h2>📌 Pinterest Board</h2>
        <!-- 請將下方 href 替換成你的 Pinterest Board 網址 -->
        <a data-pin-do="embedBoard" data-pin-board-width="auto" data-pin-scale-height="240" data-pin-scale-width="80" href="https://www.pinterest.com/pinterest/official-news/"></a>
        <script async defer src="//assets.pinterest.com/js/pinit.js"></script>
    </div>

    <!-- Instagram: 豐田裕大 -->
    <div class="card">
        <h2>📸 豐田裕大 (Yudai Toyoda)</h2>
        <div style="height: 400px; overflow-y: scroll;">
            <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/yudaityoda_official/" data-instgrm-version="14" style="width:100%;"></blockquote>
        </div>
    </div>

    <!-- Instagram: 中川紅葉 -->
    <div class="card">
        <h2>📸 中川紅葉 (Kureha Nakagawa)</h2>
        <div style="height: 400px; overflow-y: scroll;">
            <blockquote class="instagram-media" data-instgrm-permalink="https://www.instagram.com/kureha_nakagawa/" data-instgrm-version="14" style="width:100%;"></blockquote>
        </div>
    </div>

    <!-- 日本重大新聞 -->
    <div class="card">
        <h2>🇯🇵 日本當天重大新聞 (Yahoo Japan)</h2>
        <div id="news-container">載入中...</div>
    </div>
</div>

<script async src="//www.instagram.com/embed.js"></script>
<script>
    // 使用 RSS2JSON API 抓取 Yahoo Japan 新聞
    async function fetchNews() {
        const rssUrl = 'https://news.yahoo.co.jp/rss/topics/top-picks.xml';
        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;
        
        try {
            const response = await fetch(apiUrl);
            const data = await response.json();
            const container = document.getElementById('news-container');
            container.innerHTML = '';
            
            data.items.slice(0, 5).forEach(item => {
                const div = document.createElement('div');
                div.className = 'news-item';
                div.innerHTML = `<a href="${item.link}" target="_blank">${item.title}</a>`;
                container.appendChild(div);
            });
        } catch (error) {
            document.getElementById('news-container').innerHTML = '無法載入新聞，請稍後再試。';
        }
    }
    fetchNews();
</script>

</body>
</html>
