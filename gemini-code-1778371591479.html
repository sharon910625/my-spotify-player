<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Dashboard | Premium Feed</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            /* 視覺色彩系統：深藍與香檳金 */
            --prussian-blue: #003153;   /* 普魯士藍 */
            --midnight-blue: #0a192f;   /* 午夜深藍 */
            --champagne-gold: #C5A059;  /* 香檳金 */
            --gold-hover: #E5D08F;      /* 淺金色 (滑鼠懸停) */
            --bg-light: #fdfbf7;        /* 帶有奶油質感的暖白底色 */
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #737373;
        }

        body {
            /* 設定為襯線字體，展現古典與優雅 */
            font-family: 'Noto Serif JP', 'Yu Mincho', 'Hiragino Mincho ProN', serif;
            background-color: var(--bg-light);
            /* 頂部加入深藍色漸層，營造深邃空間感 */
            background-image: linear-gradient(to bottom, var(--midnight-blue) 0%, var(--prussian-blue) 250px, var(--bg-light) 400px);
            background-repeat: no-repeat;
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px; 
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 0 30px 0;
            margin-bottom: 40px;
        }

        h1 { 
            color: var(--champagne-gold); /* 標題使用香檳金 */
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .timestamp { 
            font-size: 0.85em; 
            color: #a8b2c1; 
            letter-spacing: 1px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .section {
            background: var(--card-bg);
            padding: 25px;
            /* 模擬金屬細框的質感 */
            border: 1px solid rgba(197, 160, 89, 0.4); 
            border-radius: 4px;
            box-shadow: 0 8px 20px rgba(0, 49, 83, 0.08);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .section:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 25px rgba(0, 49, 83, 0.15);
            border-color: var(--champagne-gold);
        }

        h2 {
            color: var(--prussian-blue);
            font-weight: 700;
            font-size: 1.15rem;
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--champagne-gold);
            letter-spacing: 1px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 10px 0 0 0;
            flex-grow: 1; 
        }

        li {
            padding: 12px 0;
            border-bottom: 1px dashed #e0e0e0;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        li:last-child { border-bottom: none; }
        
        a {
            color: var(--prussian-blue);
            text-decoration: none;
            transition: color 0.3s ease-in-out;
            display: block;
        }

        a:hover {
            color: var(--champagne-gold);
        }

        .loading { 
            color: var(--text-muted); 
            font-style: italic; 
            font-size: 0.9em;
        }

        .note { 
            font-size: 0.75rem; 
            color: var(--text-muted); 
            margin-top: 15px; 
            text-align: right;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>デイリー情報フィード</h1>
        <div class="timestamp" id="current-date"></div>
    </header>

    <div class="grid">
        <div class="section">
            <h2>豊田裕大 (Toyoda Yuda)</h2>
            <ul id="toyoda-news">
                <div class="loading">最新ニュースを取得中...</div>
            </ul>
        </div>

        <div class="section">
            <h2>日本の最新ニュース</h2>
            <ul id="japan-news">
                <div class="loading">ニュースを読み込み中...</div>
            </ul>
        </div>

        <div class="section">
            <h2>日本の文化・コスメ・グルメ</h2>
            <ul id="culture-news">
                <div class="loading">ライフスタイル情報を取得中...</div>
            </ul>
        </div>

        <div class="section">
            <h2>最新ファッション雑誌</h2>
            <ul id="fashion-news">
                <div class="loading">トレンドを取得中...</div>
            </ul>
        </div>

        <div class="section">
            <h2>松本潤 (2004-2018)</h2>
            <ul id="matsumoto-news">
                <div class="loading">過去のデータを取得中...</div>
            </ul>
            <div class="note">*RSSの特性上、アーカイブ記事のみ表示されます</div>
        </div>
    </div>
</div>

<script>
    // 使用日文格式的日期時間
    document.getElementById('current-date').innerText = `最終更新日時：${new Date().toLocaleString('ja-JP')}`;

    async function fetchNews(rssUrl, elementId) {
        const apiBase = "https://api.rss2json.com/v1/api.json?rss_url=";
        const targetElement = document.getElementById(elementId);

        try {
            const response = await fetch(apiBase + encodeURIComponent(rssUrl));
            const data = await response.json();

            if (data.status === 'ok') {
                targetElement.innerHTML = ''; 
                
                if (data.items.length === 0) {
                    targetElement.innerHTML = '<li>この期間の関連データはありません</li>';
                    return;
                }

                data.items.slice(0, 10).forEach(item => {
                    const li = document.createElement('li');
                    const a = document.createElement('a'); 
                    
                    a.href = item.link; 
                    a.textContent = item.title; 
                    a.target = "_blank"; 
                    a.rel = "noopener noreferrer"; 

                    li.appendChild(a); 
                    targetElement.appendChild(li); 
                });
            } else {
                targetElement.innerHTML = '<li>現在、新しい記事はありません</li>';
            }
        } catch (error) {
            targetElement.innerHTML = '<li>読み込みに失敗しました。ネットワーク接続を確認してください。</li>';
            console.error('Fetch error:', error);
        }
    }

    const toyodaRss = "https://news.google.com/rss/search?q=豊田裕大&hl=ja&gl=JP&ceid=JP:ja";
    const japanRss = "https://news.google.com/rss?hl=ja&gl=JP&ceid=JP:ja";
    const cultureRss = "https://news.google.com/rss/search?q=日本+(文化+OR+知識+OR+コスメ+OR+グルメ+OR+音楽)&hl=ja&gl=JP&ceid=JP:ja";
    const fashionRss = "https://news.google.com/rss/search?q=(Ray+OR+メンズノンノ+OR+\"MEN'S+NON-NO\")+雑誌+ファッション&hl=ja&gl=JP&ceid=JP:ja";
    const matsumotoRss = "https://news.google.com/rss/search?q=松本潤+after:2004-01-01+before:2018-12-31&hl=ja&gl=JP&ceid=JP:ja";

    fetchNews(toyodaRss, 'toyoda-news');
    fetchNews(japanRss, 'japan-news');
    fetchNews(cultureRss, 'culture-news');
    fetchNews(fashionRss, 'fashion-news');
    fetchNews(matsumotoRss, 'matsumoto-news');
</script>

</body>
</html>
